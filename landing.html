<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 1: The Landing Page</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/landing.css">
    <link rel="stylesheet" href="style/breadcrumb.css">
  </head>
  <body>
    <!-- Lab 1 Task 1: Header with navigation using unordered list -->
    <header>
      <div class="logo">
        <h1>Shopify</h1>
      </div>

      <nav>
        <ul>
          <li><a href="landing.html">Home</a></li>
          <li><a href="products.html">Shop</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>

      <div class="icon-container">
        <a href="cart.html" class="icon-link" aria-label="Shopping Cart">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
            />
          </svg>
        </a>

        <a href="account.html" class="icon-link" aria-label="User Account">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            />
          </svg>
        </a>
      </div>
    </header>

    <main>
      <!-- Lab 1 Task 1: Hero section with h1, paragraph, and Shop Now button -->
      <section>
        <h1>Welcome to Our Store!</h1>
        <p>
          Discover amazing products at the best prices. Shop now and get free
          shipping on orders over ₱1,000!
        </p>
        <button onclick="location.href='products.html'">Shop Now</button>
      </section>

      <!-- Lab 1 Task 1: Featured products section -->
      <section id="featured-products">
        <h2>Featured Products</h2>
        <div class="products-grid"></div>
      </section>

      <!-- Lab 1 Task 1: Discounted products section -->
      <section id="discounted-products">
        <h2>Discounted Products</h2>
        <div class="products-grid"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 My Online Store. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
